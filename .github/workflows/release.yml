name: Build and Release Zone

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"
        shell: pwsh

      - name: Restore dependencies
        run: dotnet restore Zone/Zone.csproj

      - name: Build
        run: dotnet build Zone/Zone.csproj --configuration Release -p:Platform=x64 --no-restore

      - name: Package
        run: |
          $out = "staging/Zone"
          New-Item -ItemType Directory -Force $out
          Copy-Item "Zone/bin/x64/Release/Zone.dll" $out
          Copy-Item "Zone/bin/x64/Release/Zone.json" $out
          Copy-Item "Zone/bin/x64/Release/ECommons.dll" $out
          Copy-Item "Zone/bin/x64/Release/Microsoft.Data.Sqlite.dll" $out
          Copy-Item "Zone/bin/x64/Release/SQLitePCLRaw.*.dll" $out
          Copy-Item "Zone/bin/x64/Release/runtimes" $out -Recurse
          Copy-Item "Zone/bin/x64/Release/Data" $out -Recurse
          Compress-Archive -Path "staging/Zone" -DestinationPath latest.zip -Force
        shell: pwsh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: latest.zip
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
