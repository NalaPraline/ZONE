name: Update Download Count

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get download count
        id: count
        run: |
          COUNT=$(gh api repos/NalaPraline/ZONE/releases \
            --jq '[.[].assets[] | select(.name == "latest.zip") | .download_count] | add // 0')
          echo "count=$COUNT" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update pluginmaster.json
        run: |
          COUNT=${{ steps.count.outputs.count }}
          jq ".[0].DownloadCount = $COUNT" pluginmaster.json > tmp.json && mv tmp.json pluginmaster.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "no change" || (
            git add pluginmaster.json
            git commit -m "update download count: ${{ steps.count.outputs.count }}"
            git push
          )
